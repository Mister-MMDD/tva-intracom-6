[build]
builder = "RAILPACK"
buildEnvironment = "V3"

[deploy]
runtime = "V2"
numReplicas = 1
startCommand = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0"
sleepApplication = true
useLegacyStacker = false
ipv6EgressEnabled = true
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 1
