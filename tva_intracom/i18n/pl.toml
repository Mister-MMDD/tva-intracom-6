ca3_aic_note_title = "ℹ️ Pole B2 + Wiersz 17 — Domniemane wewnątrzwspólnotowe nabycia towarów (przesunięcia zapasów FBA do {country}):"
ca3_aic_note_text = "Te domniemane wewnątrzwspólnotowe nabycia (Art. 17 Dyrektywy 2006/112/WE) generują jednocześnie VAT naliczony i należny (zerowy efekt gotówkowy netto, Art. 272 CGI). Podstawa Netto jest wykazana w polu B2 (operacja podlegająca opodatkowaniu), jej VAT jest uwzględniony w Wierszu 08 (Stawka podstawowa 20%, w przybliżeniu — patrz uwaga) z oddzielną adnotacją w Wierszu 17; odpowiednie odliczenie jest wykazane w Wierszu 20."
ca3_aic_note_warning = "⚠ Wartość szacunkowa = średnia cena sprzedaży Netto × ilość (rzeczywista wartość zakupu nie jest dostępna w plikach transakcji Amazon — Art. 83 Dyrektywy wymaga wartości zakupu)."

