ca3_vat_remb_note = "« VAT od sprzedaży » = VAT brutto wyłącznie od sprzedaży, przed odliczeniem not korygujących. « VAT ze zwrotów » = VAT ze zwrotów w danym okresie (ujemny). « VAT netto » = sprzedaż + zwroty, tę kwotę należy wykazać w formularzu."
ca3_aic_check_note = "Wiersz « z uwzględnieniem WNT » odpowiada Wierszowi 16, tak jak powinien pojawić się na formularzu (Pole B2/Wiersz 17 jest częścią Wiersza 08). Wiersz « po odliczeniu WNT » usuwa jedynie część WNT (z założenia zerowy efekt netto, Art. 272 CGI) w celu weryfikacji — NIE usuwa innych odliczeń (środki trwałe, inne towary/usługi z wyłączeniem WNT, nadwyżka z poprzedniego okresu), które pozostają szczegółowo opisane w sekcji C i są odliczane dopiero w ostatecznym saldzie (sekcja D)."

