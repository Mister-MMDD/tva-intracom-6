onboarding_sidebar_step2_body = "Oben in der Seitenleiste: Wählen Sie das **Sitzland** Ihres Unternehmens (das auf Ihrer Haupt-USt-IdNr. steht) und bei Bedarf eine andere **Anzeigewährung**. Diese Einstellung bestimmt die gesamte steuerliche Einstufung — prüfen Sie sie zuerst."
