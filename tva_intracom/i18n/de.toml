onboarding_sidebar_step3_body = "Im Bereich **Unternehmen & Einstellungen**: geben Sie Ihre SIREN-Nummer, Ihre USt-IdNr., eine optionale **IOSS**-Nummer sowie die Länder an, in denen Sie bereits lokal umsatzsteuerlich registriert sind. Diese Angaben sind für eine korrekte Berechnung erforderlich."
onboarding_sidebar_step4_title = "💳 Abonnement"
onboarding_sidebar_step4_body = "Im Bereich **Abonnements & Tarife** können Sie schließlich Exporte freischalten (Einzelkauf oder Abo). Sie können das Tool kostenlos testen, bevor Sie sich für einen Tarif entscheiden. Sie sind bereit: importieren Sie Ihre erste Datei!"

